<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #28a745, #20c997);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.container {
    background: #fff;
    padding: 35px;
    border-radius: 15px;
    text-align: center;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.icon {
    font-size: 60px;
    color: #28a745;
}

h2 {
    margin: 10px 0;
}

p {
    color: #555;
    font-size: 15px;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #28a745;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover {
    background: #218838;
}
</style>
</head>

<body>

<div class="container">

    <div class="icon">✅</div>

    <h2>Thank You!</h2>
    <p>Your request has been submitted successfully.<br>
    We will contact you shortly.</p>

    <!-- 🔥 Back Button -->
    <a href="index.html" class="btn">← Back to Website</a>

</div>

</body>
</html>
